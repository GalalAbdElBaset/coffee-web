<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Brand - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background: #1a1a2e;
            color: #eee;
            overflow-x: hidden;
        }

        /* Admin Header */
        .admin-header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo h1 {
            font-size: 1.5rem;
        }

        .logo span {
            color: #e94560;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #admin-email {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .logout-admin {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-admin:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0f3460;
            padding: 2rem 0;
            transition: all 0.3s ease;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 0.5rem;
        }

        .sidebar-nav li a {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.5rem;
            color: #eee;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-nav li a:hover,
        .sidebar-nav li a.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #e94560;
        }

        .sidebar-nav li a i {
            width: 24px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Section Styles */
        .admin-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .admin-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e94560;
            display: inline-block;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        /* Admin Card */
        .admin-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.2rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .admin-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border-color: #e94560;
        }

        .admin-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .admin-card h3 {
            margin-bottom: 0.5rem;
        }

        .admin-card p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.8rem;
        }

        .btn-edit, .btn-delete {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
        }

        .btn-edit:hover {
            background: #ffca2c;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #ff4757;
            transform: translateY(-2px);
        }

        /* Form Styles */
        .admin-form {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .admin-form h3 {
            margin-bottom: 1rem;
            color: #e94560;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn-submit {
            background: #e94560;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        /* Add Button */
        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            background: #34ce57;
            transform: translateY(-2px);
        }

        /* Messages List */
        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1rem;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .message-status {
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status-pending {
            background: #ffc107;
            color: #333;
        }

        .status-replied {
            background: #28a745;
            color: white;
        }

        /* Login Overlay */
        .admin-login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .admin-login-box {
            background: #16213e;
            padding: 2rem;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .admin-login-box h2 {
            margin-bottom: 1.5rem;
            color: #e94560;
        }

        .admin-login-box input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .admin-login-box button {
            width: 100%;
            background: #e94560;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                z-index: 200;
            }
            .sidebar.open {
                left: 0;
            }
            .main-content {
                padding: 1rem;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="admin-login-overlay" class="admin-login-overlay">
    <div class="admin-login-box">
        <h2>Admin Login</h2>
        <input type="email" id="admin-email-input" placeholder="Admin Email" value="admin@coffeebrand.com">
        <input type="password" id="admin-password-input" placeholder="Password">
        <button id="admin-login-btn">Login</button>
        <div id="admin-login-error" class="error-msg"></div>
    </div>
</div>

<div id="admin-dashboard" style="display: none;">
    <div class="admin-header">
        <div class="logo">
            <h1>Coffee <span>Brand</span> | Admin</h1>
        </div>
        <div class="admin-info">
            <span id="admin-email"></span>
            <button class="logout-admin" id="admin-logout">Logout</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="sidebar" id="sidebar">
            <ul class="sidebar-nav">
                <li><a href="#" data-section="products" class="active"><i class="fa-solid fa-mug-hot"></i> Products</a></li>
                <li><a href="#" data-section="faq"><i class="fa-solid fa-question-circle"></i> FAQ</a></li>
                <li><a href="#" data-section="stats"><i class="fa-solid fa-chart-line"></i> Statistics</a></li>
                <li><a href="#" data-section="gallery"><i class="fa-solid fa-images"></i> Gallery</a></li>
                <li><a href="#" data-section="services"><i class="fa-solid fa-concierge-bell"></i> Services</a></li>
                <li><a href="#" data-section="contacts"><i class="fa-solid fa-envelope"></i> Messages</a></li>
            </ul>
        </div>

        <div class="main-content">
            <!-- Products Section -->
            <div id="products-section" class="admin-section active">
                <h2 class="section-title">Manage Products</h2>
                <button class="add-btn" id="add-product-btn"><i class="fa-solid fa-plus"></i> Add Product</button>
                
                <div id="add-product-form" class="admin-form" style="display: none;">
                    <h3>Add New Product</h3>
                    <form id="product-form">
                        <div class="form-group">
                            <label>Product Name</label>
                            <input type="text" id="product-name" required>
                        </div>
                        <div class="form-group">
                            <label>Price (EGP)</label>
                            <input type="number" id="product-price" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="product-category">
                                <option value="espresso">Espresso</option>
                                <option value="blonde">Blonde Roast</option>
                                <option value="dark">Dark Roast</option>
                                <option value="decaf">Decaf</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="product-image" placeholder="img/menu/menu-1.png">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="product-description" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Save Product</button>
                        <button type="button" class="btn-submit" id="cancel-product" style="background:#6c757d;">Cancel</button>
                    </form>
                </div>
                
                <div id="products-grid" class="cards-grid">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- FAQ Section -->
            <div id="faq-section" class="admin-section">
                <h2 class="section-title">Manage FAQ</h2>
                <button class="add-btn" id="add-faq-btn"><i class="fa-solid fa-plus"></i> Add FAQ</button>
                
                <div id="add-faq-form" class="admin-form" style="display: none;">
                    <h3>Add New FAQ</h3>
                    <form id="faq-form">
                        <div class="form-group">
                            <label>Question</label>
                            <input type="text" id="faq-question" required>
                        </div>
                        <div class="form-group">
                            <label>Answer</label>
                            <textarea id="faq-answer" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Order</label>
                            <input type="number" id="faq-order" value="1">
                        </div>
                        <button type="submit" class="btn-submit">Save FAQ</button>
                        <button type="button" class="btn-submit" id="cancel-faq" style="background:#6c757d;">Cancel</button>
                    </form>
                </div>
                
                <div id="faq-grid" class="cards-grid">
                    <!-- FAQ items will be loaded here -->
                </div>
            </div>

            <!-- Statistics Section -->
            <div id="stats-section" class="admin-section">
                <h2 class="section-title">Manage Statistics</h2>
                <div id="stats-grid" class="cards-grid">
                    <!-- Stats will be loaded here -->
                </div>
            </div>

            <!-- Gallery Section -->
            <div id="gallery-section" class="admin-section">
                <h2 class="section-title">Manage Gallery</h2>
                <button class="add-btn" id="add-gallery-btn"><i class="fa-solid fa-plus"></i> Add Image</button>
                
                <div id="add-gallery-form" class="admin-form" style="display: none;">
                    <h3>Add Gallery Image</h3>
                    <form id="gallery-form">
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="gallery-url" placeholder="img/menu/menu-1.png" required>
                        </div>
                        <div class="form-group">
                            <label>Alt Text</label>
                            <input type="text" id="gallery-alt" placeholder="Image description">
                        </div>
                        <div class="form-group">
                            <label>Order</label>
                            <input type="number" id="gallery-order" value="1">
                        </div>
                        <button type="submit" class="btn-submit">Save Image</button>
                        <button type="button" class="btn-submit" id="cancel-gallery" style="background:#6c757d;">Cancel</button>
                    </form>
                </div>
                
                <div id="gallery-grid" class="cards-grid">
                    <!-- Gallery images will be loaded here -->
                </div>
            </div>

            <!-- Services Section -->
            <div id="services-section" class="admin-section">
                <h2 class="section-title">Manage Services</h2>
                <button class="add-btn" id="add-service-btn"><i class="fa-solid fa-plus"></i> Add Service</button>
                
                <div id="add-service-form" class="admin-form" style="display: none;">
                    <h3>Add New Service</h3>
                    <form id="service-form">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="service-title" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="service-description" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" id="service-image" placeholder="img/service/card.png">
                        </div>
                        <div class="form-group">
                            <label>Rating (1-5)</label>
                            <input type="number" id="service-rating" min="1" max="5" step="0.5" value="5">
                        </div>
                        <div class="form-group">
                            <label>Order</label>
                            <input type="number" id="service-order" value="1">
                        </div>
                        <button type="submit" class="btn-submit">Save Service</button>
                        <button type="button" class="btn-submit" id="cancel-service" style="background:#6c757d;">Cancel</button>
                    </form>
                </div>
                
                <div id="services-grid" class="cards-grid">
                    <!-- Services will be loaded here -->
                </div>
            </div>

            <!-- Contacts Section -->
            <div id="contacts-section" class="admin-section">
                <h2 class="section-title">Contact Messages</h2>
                <div id="messages-list" class="messages-list">
                    <!-- Messages will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- ========== SCRIPTS ========== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/config/supabase.js"></script>
    <script src="js/modules/ui.js"></script>
    <script src="js/admin/admin-auth.js"></script>
    <script src="js/admin/admin-products.js"></script>
    <script src="js/admin/admin-faq.js"></script>
    <script src="js/admin/admin-stats.js"></script>
    <script src="js/admin/admin-gallery.js"></script>
    <script src="js/admin/admin-services.js"></script>
    <script src="js/admin/admin-contacts.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
