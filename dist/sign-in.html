<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drip Cafe - Sign In</title>
    <link rel="stylesheet" href="css/sighnIn.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Marck+Script&display=swap" rel="stylesheet" />
    <link rel="icon" href="img/favicon.png" />
  </head>
  <body>
    <!-- Loader -->
    <div class="coffee-loader" id="coffee-loader">
      <div class="letters">
        <span>C</span><span>O</span><span>F</span><span>F</span><span>E</span><span>E</span>
        <span>B</span><span>R</span><span>A</span><span>N</span><span>D</span>
      </div>
      <p class="wait-text">Please wait...</p>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <i class="fa-solid fa-moon"></i>
    </button>
    
    <!-- Back to Top -->
    <button id="backToTop" title="Back to Top">↑</button>

    <!-- Header -->
    <header>
      <div class="second-header">
        <div class="menu-btn">
          <span class="menu-btn__burger"></span>
        </div>
        <div class="container">
          <nav class="nav">
            <div class="logo">
              <div class="image">
                <img src="img/logo.png" alt="Logo" />
              </div>
              <div class="link-logo">
                <a href="index.html" class="logo">
                  <div class="words-logo">
                    <span class="logo-first"> Coffee</span>
                    <span class="logo-last">Brand</span>
                  </div>
                </a>
              </div>
            </div>
            <ul class="menu-nav">
              <li class="scroll menu-nav__item">
                <div class="scroll-logo">
                  <div class="scroll-image">
                    <img src="img/logo.png" alt="Logo" />
                  </div>
                  <div class="scroll-link-logo">
                    <a href="index.html" class="scroll-logo">
                      <div class="words-logo">
                        <span class="logo-first"> Coffee</span>
                        <span class="logo-last">Brand</span>
                      </div>
                    </a>
                  </div>
                </div>
              </li>
              <li class="menu-nav__item"><a href="index.html" class="menu-nav__link">Home</a></li>
              <li class="menu-nav__item"><a href="menu.html" class="menu-nav__link">Menu</a></li>
              <li class="menu-nav__item"><a href="services.html" class="menu-nav__link">Services</a></li>
              <li class="menu-nav__item"><a href="about.html" class="menu-nav__link">About</a></li>
              <li class="menu-nav__item"><a href="contact.html" class="menu-nav__link">Contact</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <!-- Main Sign In Form -->
    <main class="parent-sign-in">
      <section class="sign-in">
        <div class="pic-area">
          <div class="layer"></div>
          <div class="pic-area-text">
            <div id="login-box">
              <form id="login-form">
                <label> Email:</label>
                <br />
                <input type="email" id="userid" name="userid" required />
                <br />
                <label>Password:</label>
                <br />
                <div class="password-container">
                  <input type="password" id="pswrd" name="pswrd" required />
                  <i class="fa-solid fa-eye" id="togglePassword"></i>
                </div>
                <!-- ✅ إضافة id للزر -->
                <button type="submit" id="login-btn" class="btn-order">Login</button>
              </form>
            </div>
            <a href="sign-up.html" class="create-account-link">Create New Account</a>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <div class="foot sign_in">
      <ul class="foot-content">
        <a href="#!"><i class="fab fa-twitter"></i></a>
        <a href="#!"><i class="fab fa-facebook"></i></a>
        <a href="#!"><i class="fab fa-instagram"></i></a>
        <a href="#!"><i class="fab fa-snapchat-square"></i></a>
      </ul>
      <p class="copyright">&copy; 2025 <span>Coffee Brand</span> — Made With <i class="fa fa-mug-hot"></i> by LatteLab</p>
    </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="js/config/supabase.js"></script>
  <script src="js/modules/ui.js"></script>
  <script src="js/modules/auth.js"></script>
  
  <script src="js/main.js"></script>
</body>
</html>
